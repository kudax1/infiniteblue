<!DOCTYPE html>
<html>

<head>
  <style>
    body {
      margin: 0;
      width: 1200px;
      height: 630px;
      background: linear-gradient(135deg, #0a2540 0%, #1e3a5f 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    .container {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      padding: 60px 100px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      flex-direction: column;
      align-items: center;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    img {
      height: 120px;
      margin-bottom: 30px;
    }

    h1 {
      color: white;
      font-size: 64px;
      margin: 0;
      letter-spacing: -1px;
    }

    p {
      color: #8898aa;
      font-size: 32px;
      margin-top: 15px;
      font-weight: 500;
    }
  </style>
</head>

<body>
  <div class="container">
    <img id="logo" alt="Infinite Blue" />
    <h1>Software Architecture</h1>
    <p>For Ambitious Enterprises.</p>
  </div>
  <script>
    // Read the logo from public folder
    fetch('./public/logo.webp')
      .then(r => r.blob())
      .then(blob => {
        const url = URL.createObjectURL(blob);
        document.getElementById('logo').src = url;
      });
  </script>
</body>

</html>
